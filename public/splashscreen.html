<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在启动...</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --accent-color: #6366f1;
      --text-color: #1e293b;
      --subtext-color: #64748b;
      --loader-bg: #f1f5f9;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      position: relative;
      margin-bottom: 2rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 10px 15px rgba(99, 102, 241, 0.15));
      animation: pulse 2.5s infinite ease-in-out;
    }

    .loader {
      width: 280px;
      height: 6px;
      background: var(--loader-bg);
      border-radius: 10px;
      margin: 24px auto;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .loader::after {
      content: "";
      position: absolute;
      left: -50%;
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
      animation: loading 1.8s infinite ease-in-out;
    }

    .title {
      font-size: 14px;
      margin-bottom: 0.75rem;
      letter-spacing: -0.025em;
      color: var(--text-color);
      background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      font-size: 0.95rem;
      color: var(--subtext-color);
      font-weight: 500;
      letter-spacing: 0.025em;
    }

    @keyframes loading {
      0% {
        left: -50%;
      }

      100% {
        left: 100%;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 10px 15px rgba(99, 102, 241, 0.15));
      }

      50% {
        transform: scale(1.05);
        filter: drop-shadow(0 15px 25px rgba(99, 102, 241, 0.25));
      }
    }

    .background-blobs {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      opacity: 0.4;
    }

    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent-color);
      filter: blur(100px);
      opacity: 0.1;
      border-radius: 50%;
    }

    .blob-1 {
      top: -150px;
      left: -150px;
      background: #818cf8;
    }

    .blob-2 {
      bottom: -150px;
      right: -150px;
      background: #c084fc;
    }
  </style>
</head>

<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container">
    <div class="logo-container">
      <img src="logo.svg" alt="Ranran Logo" class="logo">
    </div>
    <!-- <div class="title">然然玩机工具箱</div> -->
    <div class="loader"></div>
    <div class="status">环境初始化中，请稍后...</div>
  </div>
</body>

</html>
